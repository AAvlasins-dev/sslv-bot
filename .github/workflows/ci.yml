name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Create dummy .env for tests
        run: |
          echo "BOT_TOKEN=1234567890:AAFakeTokenForTestingOnly" > .env
          echo "DB_PATH=:memory:" >> .env
          echo "SS_LANG=ru" >> .env

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Lint check (syntax only)
        run: |
          python -m py_compile config.py db.py geo.py parser.py bot.py monitor.py main.py
          echo "All files compile OK"
